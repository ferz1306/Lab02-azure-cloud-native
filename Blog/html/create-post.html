<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <title>Criar Post</title>

    <style>
      body {
        font-family: Arial;
        background: #f4f6fb;
        margin: 0;
      }

      header {
        background: #0078d4;
        color: white;
        padding: 20px;
        text-align: center;
      }

      .container {
        max-width: 700px;
        margin: auto;
        background: white;
        padding: 30px;
        margin-top: 30px;
        border-radius: 10px;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
      }

      input,
      textarea {
        width: 100%;
        padding: 10px;
        margin-top: 10px;
        margin-bottom: 20px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      button {
        background: #0078d4;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 5px;
        cursor: pointer;
      }

      a {
        display: block;
        margin-top: 20px;
        color: #0078d4;
        text-decoration: none;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>Novo Post</h1>
    </header>

    <div class="container">
      <label>Título do Post</label>
      <input type="text" placeholder="Digite o título" />

      <label>Conteúdo</label>
      <textarea rows="6" placeholder="Escreva seu post..."></textarea>

      <button>Publicar</button>

      <a href="index.html">⬅ Voltar</a>
    </div>
  </body>
</html>
